name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - android
          - windows
          - macos-14
      release:
        description: 'Create release'
        required: true
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [[ "${{ github.event_name }}" == "push" || "${{ github.event.inputs.platform }}" == "all" || -z "${{ github.event.inputs.platform }}" ]]; then
            echo 'matrix=["macos-14", "windows-latest", "ubuntu-latest"]' >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.inputs.platform }}" == "android" ]]; then
            echo 'matrix=["ubuntu-latest"]' >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.inputs.platform }}" == "windows" ]]; then
            echo 'matrix=["windows-latest"]' >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.inputs.platform }}" == "macos-14" ]]; then
            echo 'matrix=["macos-14"]' >> $GITHUB_OUTPUT
          fi

  build:
    needs: setup
    runs-on: ${{ matrix.os }}
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      matrix:
        os: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        if: matrix.os == 'ubuntu-latest'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Get Version
        id: package_version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Build Mac App (Apple Silicon)
        if: matrix.os == 'macos-14'
        run: npm run dist -- --mac --arm64 --publish never

      - name: Build Windows App (x64)
        if: matrix.os == 'windows-latest'
        run: npm run dist -- --win --x64 --publish never

      - name: Build Android APK
        if: matrix.os == 'ubuntu-latest'
        run: |
          npm run build:web
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Mai-Reminder-${{ steps.package_version.outputs.version }}.apk

      - name: Upload Mac DMG Artifact
        if: matrix.os == 'macos-14'
        uses: actions/upload-artifact@v4
        with:
          name: Mai-Reminder-Mac-ARM64
          path: release/*.dmg
          retention-days: 7

      - name: Upload Windows EXE Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Mai-Reminder-Windows-x64
          path: release/*.exe
          retention-days: 7

      - name: Upload Android APK Artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Mai-Reminder-Android-APK
          path: android/app/build/outputs/apk/debug/Mai-Reminder-${{ steps.package_version.outputs.version }}.apk
          retention-days: 7

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Get Version
        id: package_version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package_version.outputs.version }}
          files: |
            artifacts/Mai-Reminder-Mac-ARM64/*.dmg
            artifacts/Mai-Reminder-Windows-x64/*.exe
            artifacts/Mai-Reminder-Android-APK/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
